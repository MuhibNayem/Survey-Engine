spring:
  application:
    name: Survey-Engine

  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true

  # --- JPA ---
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
    redis:
      enabled: true
    rabbit:
      enabled: true

# --- Server ---
server:
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    display-request-duration: true
    doc-expansion: none

survey-engine:
  auth:
    cache:
      oidc-metadata:
        ttl: ${SURVEY_ENGINE_AUTH_CACHE_OIDC_METADATA_TTL:24h}
        key-prefix: ${SURVEY_ENGINE_AUTH_CACHE_OIDC_METADATA_KEY_PREFIX:survey-engine:auth-cache:oidc-metadata}
      jwks:
        ttl: ${SURVEY_ENGINE_AUTH_CACHE_JWKS_TTL:15m}
        key-prefix: ${SURVEY_ENGINE_AUTH_CACHE_JWKS_KEY_PREFIX:survey-engine:auth-cache:jwks}

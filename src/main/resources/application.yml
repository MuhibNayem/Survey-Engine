spring:
  application:
    name: Survey-Engine

  cache:
    type: redis
    redis:
      cache-null-values: false
      use-key-prefix: true

  # --- JPA ---
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  otlp:
    metrics:
      export:
        # Keep OTLP export opt-in; avoids noisy connection-refused logs when no collector is deployed.
        enabled: ${OTLP_METRICS_ENABLED:false}
        url: ${OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
    redis:
      enabled: true
    rabbit:
      enabled: true

# --- Server ---
server:
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    display-request-duration: true
    doc-expansion: none

survey-engine:
  auth:
    responder:
      cookie:
        secure: ${SURVEY_ENGINE_AUTH_RESPONDER_COOKIE_SECURE:true}
        same-site: ${SURVEY_ENGINE_AUTH_RESPONDER_COOKIE_SAME_SITE:Lax}
      csrf:
        enabled: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_ENABLED:true}
        cookie-name: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_COOKIE_NAME:responder_xsrf}
        header-name: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_HEADER_NAME:X-Responder-Csrf}
        secret: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_SECRET:change-me-in-production}
      exchange:
        enforce-origin-allowlist: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_ENFORCE_ORIGIN_ALLOWLIST:false}
        allow-missing-origin: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_ALLOW_MISSING_ORIGIN:false}
        allowed-origins: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_ALLOWED_ORIGINS:}
        rate-limit-enabled: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_RATE_LIMIT_ENABLED:true}
        rate-limit-per-minute: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_RATE_LIMIT_PER_MINUTE:30}
    cache:
      oidc-metadata:
        ttl: ${SURVEY_ENGINE_AUTH_CACHE_OIDC_METADATA_TTL:24h}
        key-prefix: ${SURVEY_ENGINE_AUTH_CACHE_OIDC_METADATA_KEY_PREFIX:survey-engine:auth-cache:oidc-metadata}
      jwks:
        ttl: ${SURVEY_ENGINE_AUTH_CACHE_JWKS_TTL:15m}
        key-prefix: ${SURVEY_ENGINE_AUTH_CACHE_JWKS_KEY_PREFIX:survey-engine:auth-cache:jwks}
  links:
    public-base-url: ${SURVEY_ENGINE_LINKS_PUBLIC_BASE_URL:https://survey.example.com}

spring:
  # --- PostgreSQL (dev) ---
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/survey_engine_dev}
    username: ${DATABASE_USERNAME:survey_dev}
    password: ${DATABASE_PASSWORD:survey_dev_pass}
    driver-class-name: org.postgresql.Driver

  # --- JPA (dev) ---
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # --- Redis (dev) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # --- RabbitMQ (dev) ---
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  # --- H2 Console (dev) ---
  h2:
    console:
      enabled: false

# --- Actuator (dev) ---
management:
  endpoint:
    health:
      show-details: always

# --- Logging (dev) ---
logging:
  level:
    com.bracits.surveyengine: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

survey-engine:
  security:
    cookies:
      secure: false
      same-site: Strict
  links:
    public-base-url: ${SURVEY_ENGINE_LINKS_PUBLIC_BASE_URL:http://localhost:5173}

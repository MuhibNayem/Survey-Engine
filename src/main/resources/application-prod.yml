spring:
  # --- PostgreSQL (prod) — injected via environment ---
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # --- JPA (prod) ---
  jpa:
    show-sql: false

  # --- Redis (prod) ---
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # --- RabbitMQ (prod) ---
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

  # --- H2 Console disabled ---
  h2:
    console:
      enabled: false

# --- Logging (prod) ---
logging:
  level:
    com.bracits.surveyengine: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

survey-engine:
  auth:
    responder:
      cookie:
        secure: ${SURVEY_ENGINE_AUTH_RESPONDER_COOKIE_SECURE:true}
        same-site: ${SURVEY_ENGINE_AUTH_RESPONDER_COOKIE_SAME_SITE:None}
      csrf:
        enabled: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_ENABLED:true}
        cookie-name: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_COOKIE_NAME:responder_xsrf}
        header-name: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_HEADER_NAME:X-Responder-Csrf}
        secret: ${SURVEY_ENGINE_AUTH_RESPONDER_CSRF_SECRET}
      exchange:
        enforce-origin-allowlist: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_ENFORCE_ORIGIN_ALLOWLIST:false}
        allow-missing-origin: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_ALLOW_MISSING_ORIGIN:false}
        allowed-origins: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_ALLOWED_ORIGINS:}
        rate-limit-enabled: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_RATE_LIMIT_ENABLED:true}
        rate-limit-per-minute: ${SURVEY_ENGINE_AUTH_RESPONDER_EXCHANGE_RATE_LIMIT_PER_MINUTE:30}
  search:
    min-query-length: ${SEARCH_MIN_QUERY_LENGTH:2}
    max-query-length: ${SEARCH_MAX_QUERY_LENGTH:120}
    default-limit: ${SEARCH_DEFAULT_LIMIT:12}
    max-results: ${SEARCH_MAX_RESULTS:30}
    title-similarity-threshold: ${SEARCH_TITLE_SIMILARITY_THRESHOLD:0.24}
    body-similarity-threshold: ${SEARCH_BODY_SIMILARITY_THRESHOLD:0.18}
    title-word-similarity-threshold: ${SEARCH_TITLE_WORD_SIMILARITY_THRESHOLD:0.45}
    body-word-similarity-threshold: ${SEARCH_BODY_WORD_SIMILARITY_THRESHOLD:0.35}
    query-timeout-ms: ${SEARCH_QUERY_TIMEOUT_MS:3000}
    rate-limit-per-minute: ${SEARCH_RATE_LIMIT_PER_MINUTE:30}
    cache-ttl-seconds: ${SEARCH_CACHE_TTL_SECONDS:300}
    fallback-cache-grace-seconds: ${SEARCH_FALLBACK_CACHE_GRACE_SECONDS:900}
    cache-max-entries: ${SEARCH_CACHE_MAX_ENTRIES:2000}
    slow-query-threshold-ms: ${SEARCH_SLOW_QUERY_THRESHOLD_MS:500}
    circuit-breaker-sliding-window-size: ${SEARCH_CB_SLIDING_WINDOW_SIZE:20}
    circuit-breaker-minimum-calls: ${SEARCH_CB_MINIMUM_CALLS:10}
    circuit-breaker-failure-rate-threshold: ${SEARCH_CB_FAILURE_RATE_THRESHOLD:50}
    circuit-breaker-open-state-seconds: ${SEARCH_CB_OPEN_STATE_SECONDS:30}
    circuit-breaker-half-open-calls: ${SEARCH_CB_HALF_OPEN_CALLS:3}

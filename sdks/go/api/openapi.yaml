        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenValidationResult"
          description: Token validation result returned
      security: []
      summary: Validate responder token against tenant auth policy
      tags:
      - Auth Profiles
  /api/v1/auth/respondent/oidc/start:
    post:
      description: |
        Why this endpoint is needed:
        Private campaigns need a secure and tenant-aware way to initiate responder SSO without exposing platform-internal logic.

        What this endpoint does:
        It validates campaign + tenant eligibility for OIDC flow, creates one-time state/nonce context,
        and returns IdP authorization URL details.

        How this endpoint does it:
        The OIDC service checks campaign auth mode and tenant auth profile mode, fetches OIDC metadata,
        stores state with expiry, composes authorization URL with scopes/state/nonce, and returns OidcStartResponse.
      operationId: startRespondentOidc
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OidcStartRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OidcStartResponse"
          description: OIDC authorization URL generated
        "400":
          $ref: "#/components/responses/ValidationError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      security: []
      summary: Start private responder OIDC flow
      tags:
      - OIDC Respondent Flow
  /api/v1/auth/respondent/oidc/callback:
    get:
      description: |
        Why this endpoint is needed:
        Authorization-code OIDC requires callback handling to exchange code, verify trust, and convert external auth into
        internal responder access state.

        What this endpoint does:
        It validates callback state/code, exchanges token at IdP, validates token claims, and issues one-time responder access code.

        How this endpoint does it:
        OIDC state record is checked for expiry and one-time use, token exchange is executed via configured metadata,
        token validation service verifies claims/mappings, responder access code row is persisted, and either JSON response
        or redirect response is returned.
      operationId: completeRespondentOidc
      parameters:
      - explode: true
        in: query
        name: state
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: code
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OidcCallbackResponse"
          description: Callback processed and access code returned
        "302":
          description: Redirect response emitted when returnPath was provided
        "403":
          $ref: "#/components/responses/ForbiddenError"
      security: []
      summary: Complete OIDC callback and issue one-time responder access code
      tags:
      - OIDC Respondent Flow

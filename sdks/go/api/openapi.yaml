          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponseResponse"
          description: Response locked
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
      summary: Lock a response manually
      tags:
      - Responses
  /api/v1/responses/{id}/reopen:
    post:
      description: |
        Why this endpoint is needed:
        Real operations require a controlled exception path for corrections after lock.

        What this endpoint does:
        It reopens a previously locked response and captures reason/window metadata.

        How this endpoint does it:
        Locking service validates state transitions and reason constraints, updates response status,
        and returns reopened response record. If campaign close date has passed, close-time lock enforcement may lock it again.
      operationId: reopenResponse
      parameters:
      - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReopenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponseResponse"
          description: Response reopened
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Reopen a locked response with reason
      tags:
      - Responses

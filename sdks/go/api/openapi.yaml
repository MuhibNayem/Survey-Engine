      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureAnalyticsDTO"
          description: Feature analytics
      security:
      - bearerAuth: []
      summary: Get usage analytics for a feature
      tags:
      - Feature Management
  /api/v1/features/available:
    get:
      description: |
        Why this endpoint is needed:
        Frontend applications need to know which features are available and incomplete for the logged-in user.
      operationId: getAvailableFeatures
      parameters:
      - explode: true
        in: query
        name: category
        required: false
        schema:
          $ref: "#/components/schemas/FeatureCategory"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FeatureStatusDTO"
                type: array
          description: List of available features
      security:
      - bearerAuth: []
      summary: Get features available to current user
      tags:
      - User Features
  /api/v1/features/{featureKey}/complete:
    post:
      description: |
        Why this endpoint is needed:
        Users need to record completion of tours, tooltips, or feature interactions for progress tracking.
      operationId: completeFeature
      parameters:
      - explode: false
        in: path
        name: featureKey
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/completeFeature_request"
        required: false
      responses:
        "200":
          description: Feature marked as completed
        "404":
          $ref: "#/components/responses/NotFoundError"
      security:
      - bearerAuth: []
      summary: Mark a feature as completed
      tags:
      - User Features
  /api/v1/features/{featureKey}/status:
    get:
      description: |
        Why this endpoint is needed:
        Frontend needs to check if a specific feature has been completed by the current user.
      operationId: getFeatureStatus
      parameters:
      - explode: false
        in: path
        name: featureKey
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureStatusDTO"
          description: Feature status
      security:
      - bearerAuth: []
      summary: Get feature status for current user
      tags:
      - User Features

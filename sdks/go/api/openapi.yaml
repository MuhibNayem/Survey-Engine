openapi: 3.1.0
info:
  description: |
    Comprehensive API contract for the Survey Engine MVP.

    This specification is written for product, implementation, and integration teams.
    Every endpoint description intentionally includes:
    1) why the endpoint is needed,
    2) what the endpoint does,
    3) how the endpoint works inside the platform lifecycle.

    Security model summary:
    - Admin APIs accept engine-issued JWT via HttpOnly access_token cookie (primary) or Bearer header (fallback).
    - Headless clients can use explicit token-mode auth endpoints under /api/v1/admin/auth/token/*.
    - Admin sessions are maintained with refresh-token cookie rotation.
    - Browser cookie mode exposes CSRF bootstrap endpoint at /api/v1/admin/auth/csrf.
    - Responder submission endpoint is public at transport level, but private campaigns enforce tenant-scoped responder authentication in business logic.
  title: Survey Engine MVP API
  version: 1.1.0
servers:
- description: Same-origin deployment
  url: /
security:
- bearerAuth: []
tags:
- description: "Register, login, and refresh token operations for tenant administrators."
  name: Admin Authentication
- description: Tenant subscription visibility and checkout operations.
  name: Subscription
- description: Plan listing and super-admin plan governance endpoints.
  name: Plan Catalog
- description: Question bank lifecycle endpoints.
  name: Questions
- description: Category lifecycle endpoints and question grouping.
  name: Categories
- description: Survey authoring and lifecycle transition endpoints.
  name: Surveys
- description: "Campaign setup, settings, activation, and distribution endpoints."
  name: Campaigns
- description: Tenant responder-auth configuration and diagnostics endpoints.
  name: Auth Profiles
- description: Private responder OIDC start and callback endpoints.
  name: OIDC Respondent Flow
- description: "Response submission, lock/reopen workflow, and campaign analytics\
    \ endpoints."
  name: Responses
- description: Weight profile lifecycle and score calculation endpoints.
  name: Scoring
- description: "Platform-level tenant administration, impersonation, and metrics endpoints."
  name: Super Admin
- description: Tenant-scoped and platform-scoped activity log retrieval endpoints.
  name: Audit Logs
- description: "Enterprise feature management APIs for tours, tooltips, banners, and\
    \ feature flags. Super admin endpoints for feature governance and tenant configuration."
  name: Feature Management
- description: User-level feature access and completion tracking endpoints.
  name: User Features
paths:
  /api/v1/admin/auth/register:
    post:
      description: |
        Why this endpoint is needed:
        A brand-new subscriber needs a secure, first-class admin identity to operate the platform. Without this endpoint,
        onboarding would require manual platform-team intervention and would break self-service SaaS adoption.

        What this endpoint does:
        It creates the first admin user for a tenant, ensures tenant provisioning exists, ensures a trial subscription exists,
        sets access/refresh tokens as HttpOnly cookies, and returns safe user context in response body.

        How this endpoint does it:
        The service validates uniqueness of email, provisions tenant records when necessary, enforces admin-user quota policy,
        stores password hash securely, issues an engine-signed JWT access token, creates a refresh token row, and controller
        writes both tokens into secure cookies before returning AuthUserResponse.
      operationId: registerAdmin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"
          description: Admin account created and authenticated session returned
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
      security: []
      summary: Register a tenant admin account and bootstrap tenant access
      tags:
      - Admin Authentication
  /api/v1/admin/auth/login:
    post:
      description: |
        Why this endpoint is needed:
        Admin operators need a secure login path to start authenticated management sessions for tenant resources.

        What this endpoint does:
        It authenticates the admin using email/password, revokes prior refresh tokens for session hygiene, and issues
        a fresh access token plus a new refresh token as HttpOnly cookies.

        How this endpoint does it:
        The service verifies account status and password hash, rotates refresh-token state to avoid stale session reuse,
        and controller writes cookies while returning safe user context payload.
      operationId: loginAdmin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"
          description: Login successful and new auth cookies issued
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      security: []
      summary: Log in an existing admin and issue fresh auth cookies
      tags:
      - Admin Authentication
  /api/v1/admin/auth/refresh:
    post:
      description: |
        Why this endpoint is needed:
        Access tokens are intentionally short-lived. A secure refresh mechanism is required to keep admins signed in
        without repeatedly collecting credentials.

        What this endpoint does:
        It reads refresh token from HttpOnly cookie, validates it, rotates token state, and sets fresh access/refresh cookies.

        How this endpoint does it:
        Controller extracts refresh_token cookie, service validates persistence state (including expiry/revocation),
        applies one-time-use rotation semantics, and controller rewrites secure cookies.
      operationId: refreshAdminToken
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"
          description: Cookie rotation successful
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      security: []
      summary: Rotate refresh cookie and issue a new admin session
      tags:
      - Admin Authentication
  /api/v1/admin/auth/logout:
    post:
      description: |
        Why this endpoint is needed:
        Sessions must support explicit and secure sign-out to prevent lingering browser-side authentication state.

        What this endpoint does:
        It clears access_token and refresh_token cookies.

        How this endpoint does it:
        Controller writes both token cookies with maxAge=0, path=/, HttpOnly/Secure attributes.
      operationId: logoutAdmin
      responses:
        "204":
          description: Logout completed and cookies cleared
      security: []
      summary: Clear admin auth cookies
      tags:
      - Admin Authentication
  /api/v1/admin/auth/me:
    get:
      description: |
        Why this endpoint is needed:
        Frontend needs a lightweight session-hydration endpoint after reload to confirm authentication and tenant context.

        What this endpoint does:
        It returns current authenticated user's profile details (no tokens).

        How this endpoint does it:
        JWT filter populates security/tenant context from cookie or bearer token, and controller maps context to response DTO.
      operationId: getCurrentAdmin
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"
          description: Current admin profile returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      summary: Retrieve current authenticated admin profile
      tags:
      - Admin Authentication
  /api/v1/admin/auth/csrf:
    get:
      description: |
        Why this endpoint is needed:
        Browser-based admin sessions use HttpOnly auth cookies and require CSRF token submission for state-changing requests.

        What this endpoint does:
        It returns the current CSRF token value and ensures CSRF cookie state is initialized for the caller.

        How this endpoint does it:
        Spring Security creates/loads token via cookie token repository, controller returns it as a simple JSON payload.
      operationId: getCsrfToken
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfTokenResponse"
          description: CSRF token returned
      security: []
      summary: Get CSRF token for browser cookie session mode
      tags:
      - Admin Authentication
  /api/v1/admin/auth/token/register:
    post:
      description: |
        Why this endpoint is needed:
        Headless/API clients cannot reliably consume browser cookie flows and need explicit token payloads.

        What this endpoint does:
        It performs the same registration flow as cookie mode but returns access/refresh tokens directly in response body.

        How this endpoint does it:
        Service runs standard tenant bootstrap/registration pipeline and controller returns AuthResponse without writing cookies.
      operationId: registerAdminTokenMode
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Admin registered and token payload returned
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
      security: []
      summary: Register admin in headless token mode
      tags:
      - Admin Authentication
  /api/v1/admin/auth/token/login:
    post:
      description: |
        Why this endpoint is needed:
        API clients and external automation flows need explicit JWT credentials in response body.

        What this endpoint does:
        It authenticates admin credentials and returns fresh access/refresh tokens directly in payload.

        How this endpoint does it:
        Service validates credentials, rotates refresh-token state, and controller returns AuthResponse DTO.
      operationId: loginAdminTokenMode
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Login successful and token payload returned
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      security: []
      summary: Log in admin in headless token mode
      tags:
      - Admin Authentication
  /api/v1/admin/auth/token/refresh:
    post:
      description: |
        Why this endpoint is needed:
        Headless integrations need refresh-token rotation without cookie transport.

        What this endpoint does:
        It validates provided refresh token and returns a rotated access/refresh token pair.

        How this endpoint does it:
        Controller accepts RefreshTokenRequest payload and delegates to refresh-token rotation service.
      operationId: refreshAdminTokenMode
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
          description: Token rotation successful
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      security: []
      summary: Refresh session in headless token mode
      tags:
      - Admin Authentication
  /api/v1/admin/auth/revert-impersonation:
    post:
      description: |
        Why this endpoint is needed:
        Super-admin support sessions must safely return from tenant impersonation to original privileged context.

        What this endpoint does:
        It restores stashed super-admin auth cookies and clears temporary impersonation cookies.

        How this endpoint does it:
        Cookie utility reads stashed `sa_*` cookies, rewrites primary auth cookies, and clears impersonation artifacts.
      operationId: revertImpersonation
      responses:
        "200":
          description: Impersonation context reverted
      security: []
      summary: Restore original super-admin cookies after impersonation
      tags:
      - Admin Authentication
  /api/v1/admin/subscriptions/me:
    get:
      description: |
        Why this endpoint is needed:
        Tenant operators must understand their active entitlement before launching campaigns or scaling usage.

        What this endpoint does:
        It returns the authenticated tenant's current subscription record, including plan, status, billing period,
        quota limits, and latest payment reference.

        How this endpoint does it:
        Tenant context is extracted from admin JWT claims, then subscription and plan metadata are joined and mapped into
        a SubscriptionResponse object for a single, dashboard-friendly read.
      operationId: getMySubscription
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
          description: Subscription details returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "402":
          $ref: "#/components/responses/PaymentRequiredError"
      summary: Get current tenant subscription details
      tags:
      - Subscription
  /api/v1/admin/subscriptions/checkout:
    post:
      description: |
        Why this endpoint is needed:
        SaaS tenants need a direct API path to activate or upgrade plans without out-of-band support workflows.

        What this endpoint does:
        It takes the requested plan, executes the checkout flow (mock success in MVP), updates subscription status,
        records payment transaction metadata, and returns updated subscription state.

        How this endpoint does it:
        The service uses authenticated tenant context, validates requested plan existence, executes payment gateway abstraction,
        persists subscription changes and payment reference details, and returns normalized quota-aware response fields.
      operationId: checkoutSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
          description: Subscription activated or updated
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      summary: Start or change tenant subscription plan
      tags:
      - Subscription
  /api/v1/admin/plans:
    get:
      description: |
        Why this endpoint is needed:
        Tenants and platform operators both need a canonical list of active plans with limits and pricing attributes.

        What this endpoint does:
        It returns all active plan definitions including quota constraints such as maximum campaigns,
        max responses per campaign, and max admin users.

        How this endpoint does it:
        The plan catalog service reads persistent plan definition rows, filters active plans, maps entities to API DTOs,
        and returns a list suitable for onboarding forms and pricing pages.
      operationId: listPlans
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/PlanDefinitionResponse"
                type: array
          description: Active plans returned
      security: []
      summary: List active plan definitions
      tags:
      - Plan Catalog
    put:
      description: |
        Why this endpoint is needed:
        Plan governance must evolve over time as business strategy changes. A controlled mutation endpoint is needed
        for super administrators to adjust commercial limits safely.

        What this endpoint does:
        It inserts or updates a plan definition, including display metadata, billing-cycle metadata, and quota parameters.

        How this endpoint does it:
        The endpoint is protected by super-admin role checks, validates request constraints,
        persists the plan catalog mutation, and returns the resulting plan definition used by runtime quota enforcement.
      operationId: upsertPlan
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanDefinitionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanDefinitionResponse"
          description: Plan upsert completed
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
      summary: Create or update a plan definition (SUPER_ADMIN)
      tags:
      - Plan Catalog
  /api/v1/admin/superadmin/metrics:
    get:
      description: |
        Why this endpoint is needed:
        Platform operators require fast, aggregate visibility into tenant and subscription health.

        What this endpoint does:
        It returns key platform counters such as total tenants, active subscriptions, and aggregate usage.

        How this endpoint does it:
        Super-admin service aggregates metrics from tenant/subscription/usage stores and maps them to response DTO.
      operationId: getSuperAdminMetrics
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminMetricsResponse"
          description: Platform metrics returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
      summary: Retrieve platform-level metrics snapshot
      tags:
      - Super Admin
  /api/v1/admin/superadmin/tenants:
    get:
      description: |
        Why this endpoint is needed:
        Super-admin workflows require tenant inventory with billing and active-state context for support and governance.

        What this endpoint does:
        It returns paged tenant overview data including subscription plan and activity state.

        How this endpoint does it:
        Tenant-admin service queries tenant/subscription aggregates and returns Spring Data paged response structure.
      operationId: listTenantsForSuperAdmin
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 0
          minimum: 0
          type: integer
        style: form
      - explode: true
        in: query
        name: size
        required: false
        schema:
          default: 20
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: sort
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageTenantOverviewResponse"
          description: Tenant page returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
      summary: List tenants with subscription and status overview
      tags:
      - Super Admin
  /api/v1/admin/superadmin/tenants/metrics:
    get:
      description: |
        Why this endpoint is needed:
        Some super-admin UI bundles consume tenant-admin namespace for platform metrics.

        What this endpoint does:
        It returns the same platform metrics payload as `/api/v1/admin/superadmin/metrics`.

        How this endpoint does it:
        Controller delegates to the same metrics service used by primary super-admin metrics endpoint.
      operationId: getTenantAdminMetrics
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminMetricsResponse"
          description: Platform metrics returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
      summary: Retrieve platform metrics via tenant-admin namespace
      tags:
      - Super Admin
  /api/v1/admin/superadmin/tenants/{tenantId}/suspend:
    put:
      operationId: suspendTenant
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Tenant suspended
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Suspend a tenant
      tags:
      - Super Admin
  /api/v1/admin/superadmin/tenants/{tenantId}/activate:
    put:
      operationId: activateTenant
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Tenant activated
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Activate a tenant
      tags:
      - Super Admin
  /api/v1/admin/superadmin/tenants/{tenantId}/impersonate:
    post:
      operationId: impersonateTenant
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserResponse"
          description: Impersonation session created
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Impersonate a tenant admin context
      tags:
      - Super Admin
  /api/v1/admin/superadmin/tenants/{tenantId}/subscriptions/override:
    post:
      operationId: overrideTenantSubscription
      parameters:
      - explode: false
        in: path
        name: tenantId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverrideSubscriptionRequest"
        required: true
      responses:
        "204":
          description: Subscription override applied
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Override tenant subscription plan as super admin
      tags:
      - Super Admin
  /api/v1/questions:
    get:
      description: |
        Why this endpoint is needed:
        Authoring UIs require fast retrieval of available question inventory during survey design.

        What this endpoint does:
        It returns active, tenant-scoped question records currently available for composition.

        How this endpoint does it:
        The question service uses tenant-aware repository filtering and maps entity rows into response DTOs for list rendering.
      operationId: listQuestions
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/QuestionResponse"
                type: array
          description: Active questions returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      summary: List active questions for current tenant
      tags:
      - Questions
    post:
      description: |
        Why this endpoint is needed:
        The question bank is the foundation of reusable survey content. Teams need a way to add standardized question assets
        once and reuse them across many surveys.

        What this endpoint does:
        It creates a question with text, type, and scoring metadata and stores version context used by downstream snapshots.

        How this endpoint does it:
        The service validates required fields and max score constraints, applies tenant scoping from auth context,
        persists the question entity, and returns a QuestionResponse containing metadata and version pointers.
      operationId: createQuestion
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
          description: Question created
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      summary: Create a reusable question
      tags:
      - Questions
  /api/v1/questions/{id}:
    delete:
      description: |
        Why this endpoint is needed:
        Historical integrity is important, so hard-deletes are avoided while obsolete questions must be removed from active authoring lists.

        What this endpoint does:
        It marks the target question as inactive.

        How this endpoint does it:
        The service resolves the question by tenant context, updates active status, and returns no-content on success.
      operationId: deactivateQuestion
      parameters:
      - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Question deactivated
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Deactivate a question
      tags:
      - Questions
    get:
      description: |
        Why this endpoint is needed:
        Detailed question retrieval is required for edit forms, review pages, and diagnostics.

        What this endpoint does:
        It returns one question record by identifier under tenant access control.

        How this endpoint does it:
        The service resolves the record by ID with tenant-scoped checks and maps the result to a QuestionResponse DTO.
      operationId: getQuestion
      parameters:
      - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
          description: Question returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Get one question by id
      tags:
      - Questions
    put:
      description: |
        Why this endpoint is needed:
        Content quality evolves over time and questions require controlled updates.

        What this endpoint does:
        It updates question fields and maintains version continuity used by snapshot-based references.

        How this endpoint does it:
        The service validates payload constraints, checks tenant ownership, persists changes, and returns updated question data.
      operationId: updateQuestion
      parameters:
      - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionResponse"
          description: Question updated
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
      summary: Update an existing question
      tags:
      - Questions
  /api/v1/categories:
    get:
      description: |
        Why this endpoint is needed:
        Authoring screens need category inventory for survey composition and weighting strategy.

        What this endpoint does:
        It returns active categories available in the authenticated tenant workspace.

        How this endpoint does it:
        The category service applies tenant filters and active-state filters, then maps entity results to response DTOs.
      operationId: listCategories
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/CategoryResponse"
                type: array
          description: Categories returned
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      summary: List active categories
      tags:
      - Categories
    post:
      description: |
        Why this endpoint is needed:
        Categories group question assets into business dimensions that support structure, analytics, and scoring design.

        What this endpoint does:
        It creates a category with optional question mappings and stores category metadata under tenant ownership.

        How this endpoint does it:
        The service validates category payloads, checks referenced question constraints where needed,
        persists category + mappings, and returns CategoryResponse with mapping summaries.
      operationId: createCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
          description: Category created
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
